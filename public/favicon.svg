<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="128" height="128" fill="#0a0a0c"/>

  <!-- Subtle outer circle -->
  <circle cx="64" cy="64" r="60" fill="none" stroke="#14b8a6" stroke-width="0.5" opacity="0.2"/>

  <!-- Letter U -->
  <g transform="translate(64, 64)">
    <!-- Left vertical line -->
    <rect x="-20" y="-28" width="8" height="48" rx="4" fill="#14b8a6"/>

    <!-- Right vertical line -->
    <rect x="12" y="-28" width="8" height="48" rx="4" fill="#14b8a6"/>

    <!-- Bottom curve -->
    <path d="M -16 20 Q -16 30 -8 36 Q 0 42 8 36 Q 16 30 16 20"
          fill="none" stroke="#14b8a6" stroke-width="8" stroke-linecap="round"/>

    <!-- Accent gradient line inside -->
    <path d="M -18 -25 Q 0 -22 18 -25"
          stroke="#6c5ce7" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7"/>
  </g>
</svg>
